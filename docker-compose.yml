name: your-service-name
services:
  your-service-name:
    build: .
    image: your-service-name
    pull_policy: never
    restart: unless-stopped
    user: root
    command: >-
      sh -lc "mkdir -p /app/node_modules /app/.next &&
      chown -R node:node /app/node_modules /app/.next &&
      exec su node -s /bin/sh -c 'npm run dev; tail -f /dev/null'"
    ports:
      - '5001:5001'
    env_file:
      - .env.local
    environment:
      - WATCHPACK_POLLING=true
    depends_on:
      - postgres
    working_dir: /app
    volumes:
      - .:/app
      - next-node-modules:/app/node_modules
      - next-build-cache:/app/.next

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pos
      POSTGRES_USER: pos
      POSTGRES_PASSWORD: pos
    ports:
      - '7777:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
  next-node-modules:
  next-build-cache:
